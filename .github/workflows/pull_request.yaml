name: pull_request
on:
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  MISE_EXPERIMENTAL: true
jobs:
  build_binary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: jdx/mise-action@v3
    - run: mise run cargo:build
  build_docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: jdx/mise-action@v3
    - run: mise run docker:build
