name: pull_request
on:
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  MISE_EXPERIMENTAL: true
  MISE_AUTO_INSTALL: false
jobs:
  build-container:
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
      packages: read
    with:
      output: local
      artifact-upload: true
      artifact-name: container
      push: false
      context: .
      file: ./Containerfile
      platforms: linux/amd64,linux/arm64
      cache: true
      cache-scope: build-container-pr
      meta-images: ghcr.io/wtaylor/rust-prometheus-exporter
      meta-tags: |
        type=sha
        type=raw,value=local
  build:
    name: Build binaries
    env:
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 4
      CARGO_PROFILE_DEV_CODEGEN_UNITS: 4
      CARGO_PROFILE_CHECK_ONLY_CODEGEN_UNITS: 4
      RUSTUP_TOOLCHAIN: ${{ matrix.arch }}
    strategy:
      matrix:
        include:
        - arch: x86_64-unknown-linux-gnu
          runner: ubuntu-latest
        - arch: aarch64-unknown-linux-gnu
          runner: ubuntu-24.04-arm
        - arch: x86_64-unknown-linux-musl
          runner: ubuntu-latest
        - arch: aarch64-unknown-linux-musl
          runner: ubuntu-24.04-arm
        - arch: x86_64-apple-darwin
          runner: macos-26-intel
        - arch: aarch64-apple-darwin
          runner: macos-latest
        - arch: x86_64-pc-windows-msvc
          runner: windows-latest
        - arch: aarch64-pc-windows-msvc
          runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Checkout sources
      uses: actions/checkout@v6
    - name: Cache cargo assets
      id: cache
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: cargo-build-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
    - uses: jdx/mise-action@v4
      with:
        cache_key: mise-build-${{ matrix.arch }}
        install_args: "rust"
    - name: Install musl-tools
      if: contains(matrix.arch, 'musl') && contains(matrix.runner, 'ubuntu')
      run: sudo apt-get install musl-tools
    - name: Install arch target
      run: rustup target add ${{ matrix.arch }}
    - name: Run cargo build
      run: mise run cargo:build --release --target ${{ matrix.arch }}
    - name: Create archive
      run: mise run package:archive ${{ matrix.arch }}
    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: binary-${{ matrix.arch }}
        path: dist/*
  sign-artifacts:
    name: Sign binaries
    needs: [build]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: jdx/mise-action@v4
    - uses: actions/download-artifact@v8
      with:
        path: dist
        pattern: binary-*
        merge-multiple: true
    - run: mise run package:sign
      env:
        MINISIGN_SIGNING_KEY: ${{ secrets.MINISIGN_SIGNING_KEY }}
    - name: Upload signatures
      uses: actions/upload-artifact@v6
      with:
        name: binary-signatures
        path: dist/*.minisig
