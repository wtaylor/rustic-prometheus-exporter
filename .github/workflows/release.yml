name: release
on:
  workflow_dispatch:
  push:
    branches: ["main"]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  MISE_EXPERIMENTAL: true
  MISE_AUTO_INSTALL: false
permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
    - id: release
      uses: googleapis/release-please-action@v4
      with:
        token: ${{ secrets.RELEASE_TOKEN }}
        release-type: rust
  build-container:
    name: Build container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: [release]
    if: ${{ needs.release.outputs.release_created }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - run: mkdir -p dist/docker
    - name: Build container image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: Containerfile
        push: false
        tags: rustic-prometheus-exporter:local
        outputs: type=docker,dest=dist/docker/rust-prometheus-exporter.tar
        cache-from: type=registry,ref=ghcr.io/wtaylor/rustic-prometheus-exporter:buildcache
        cache-to: type=registry,ref=ghcr.io/wtaylor/rustic-prometheus-exporter:buildcache,mode=max
    - name: Upload container as artifact
      uses: actions/upload-artifact@v6
      with:
        name: container
        path: dist/*
    - name: Push to GHCR
      run: |
        docker image tag rustic-prometheus-exporter:local ghcr.io/wtaylor/rustic-prometheus-exporter:latest
        docker image tag rustic-prometheus-exporter:local ghcr.io/wtaylor/rustic-prometheus-exporter:${{ needs.release.outputs.version }}
        docker image push -a ghcr.io/wtaylor/rustic-prometheus-exporter
  build:
    name: Build binaries
    env:
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 4
      CARGO_PROFILE_DEV_CODEGEN_UNITS: 4
      CARGO_PROFILE_CHECK_ONLY_CODEGEN_UNITS: 4
      RUSTUP_TOOLCHAIN: ${{ matrix.arch }}
    needs: [release]
    if: ${{ needs.release.outputs.release_created }}
    strategy:
      matrix:
        include:
        - arch: x86_64-unknown-linux-gnu
          runner: ubuntu-latest
        - arch: aarch64-unknown-linux-gnu
          runner: ubuntu-24.04-arm
        - arch: x86_64-unknown-linux-musl
          runner: ubuntu-latest
        - arch: aarch64-unknown-linux-musl
          runner: ubuntu-24.04-arm
        - arch: x86_64-apple-darwin
          runner: macos-26-intel
        - arch: aarch64-apple-darwin
          runner: macos-latest
        - arch: x86_64-pc-windows-msvc
          runner: windows-latest
        - arch: aarch64-pc-windows-msvc
          runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Checkout sources
      uses: actions/checkout@v6
    - name: Cache cargo assets
      id: cache
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: cargo-build-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
    - uses: jdx/mise-action@v4
      with:
        cache_key: mise-build-${{ matrix.arch }}
        install_args: "rust"
    - name: Install musl-tools
      if: contains(matrix.arch, 'musl') && contains(matrix.runner, 'ubuntu')
      run: sudo apt-get install musl-tools
    - name: Install arch target
      run: rustup target add ${{ matrix.arch }}
    - name: Run cargo build
      run: mise run cargo:build --release --target ${{ matrix.arch }}
    - name: Create archive
      run: mise run package:archive ${{ matrix.arch }}
    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: binary-${{ matrix.arch }}
        path: dist/*
  publish-artifacts:
    needs: [release, build]
    if: ${{ needs.release.outputs.release_created }}
    permissions:
      contents: write
      packages: write
      issues: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: jdx/mise-action@v4
    - uses: actions/download-artifact@v8
      with:
        path: dist
        pattern: binary-*
        merge-multiple: true
    - run: mise run package:sign
      env:
        MINISIGN_SIGNING_KEY: ${{ secrets.MINISIGN_SIGNING_KEY }}
    - name: publish
      run: |
        gh release upload ${{ needs.release.outputs.tag_name }} ./dist/*
