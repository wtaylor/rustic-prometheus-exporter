name: release
on:
  workflow_dispatch:
  push:
    branches: ["main", "feat/test-release-process"]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  MISE_EXPERIMENTAL: true
  MISE_AUTO_INSTALL: false
jobs:
  get-release-version:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: jdx/mise-action@v4
      with:
        install_args: "npm:semantic-release npm:@semantic-release/git"
    - id: version_step
      run: mise run semantic-release:get-next-version >> "$GITHUB_OUTPUT"
  release:
    needs: [build, build-docker]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: jdx/mise-action@v4
    - uses: actions/download-artifact@v8
      with:
        path: dist
        pattern: binary-*
        merge-multiple: true
    - run: mise run package:sign
      env:
        MINISIGN_SIGNING_KEY: ${{ secrets.MINISIGN_SIGNING_KEY }}
    - run: mise run ci:release
  build-docker:
    name: Build container
    runs-on: ubuntu-latest
    needs: get-release-version
    steps:
    - uses: actions/checkout@v6
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - run: mkdir -p dist/docker
    - name: Build container image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: Containerfile
        push: false
        tags: rustic-prometheus-exporter:local
        outputs: type=docker,dest=dist/docker/rust-prometheus-exporter.tar
        cache-from: type=registry,ref=wtaylor/rustic-prometheus-exporter:buildcache
        cache-to: type=registry,ref=wtaylor/rustic-prometheus-exporter:buildcache,mode=max
  build:
    name: Build binary
    env:
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 4
      CARGO_PROFILE_DEV_CODEGEN_UNITS: 4
      CARGO_PROFILE_CHECK_ONLY_CODEGEN_UNITS: 4
      RUSTUP_TOOLCHAIN: ${{ matrix.arch }}
    needs: get-release-version
    strategy:
      matrix:
        include:
        - arch: x86_64-unknown-linux-gnu
          runner: ubuntu-latest
        - arch: aarch64-unknown-linux-gnu
          runner: ubuntu-24.04-arm
        - arch: x86_64-unknown-linux-musl
          runner: ubuntu-latest
        - arch: aarch64-unknown-linux-musl
          runner: ubuntu-24.04-arm
        - arch: x86_64-apple-darwin
          runner: macos-26-intel
        - arch: aarch64-apple-darwin
          runner: macos-latest
        - arch: x86_64-pc-windows-msvc
          runner: windows-latest
        - arch: aarch64-pc-windows-msvc
          runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Checkout sources
      uses: actions/checkout@v6
    - name: Cache cargo assets
      id: cache
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: cargo-build-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
    - uses: jdx/mise-action@v4
      with:
        cache_key: bust-mise-build-${{ matrix.arch }}
        install_args: "rust"
    - name: Install musl-tools
      if: contains(matrix.arch, 'musl') && contains(matrix.runner, 'ubuntu')
      run: sudo apt-get install musl-tools
    - name: Install arch target
      run: rustup target add ${{ matrix.arch }}
    - name: Run cargo build
      run: mise run cargo:build --release --target ${{ matrix.arch }}
    - name: Create archive
      run: mise run package:archive ${{ matrix.arch }}
    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: binary-${{ matrix.arch }}
        path: dist/*
